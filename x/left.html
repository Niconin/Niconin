<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>左</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #d4edda;
    }

    /* ── PORTRAIT (sidebar) default layout ── */
    .nav-wrap {
      display: flex;
      flex-direction: row;
      height: 100%;
      border-right: 2px solid #7bbf8e;
      overflow: hidden;
      align-items: flex-start;
    }

    /* Vertical title on the left */
    h1 {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: clamp(18px, 4vh, 32px);
      margin: 0;
      padding: 4px 2px;
      flex-shrink: 0;
      white-space: nowrap;
      text-align: start;
      line-height: 1.2;
    }

    /* Links fill remaining width */
    nav {
      flex: 1;
      min-width: 0;
      container-type: inline-size;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 2px 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }

    nav ul li a {
      display: block;
      width: 100%;
      font-size: clamp(13px, 4cqi, 20px);
      font-weight: bold;
      padding: 3px 2px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-decoration: none;
    }

    nav ul li a:hover {
      background: #b3d9be;
    }

    /* ── LANDSCAPE (top bar) two-row layout ── */
    @media (orientation: landscape) {
      .nav-wrap {
        flex-direction: column;
        border-right: none;
        border-bottom: 2px solid #7bbf8e;
        overflow: hidden;
      }

      h1 {
        writing-mode: horizontal-tb;
        font-size: clamp(11px, 1.6vw, 15px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: center;
        padding: 3px 8px 1px;
        flex-shrink: 0;
        line-height: 1.2;
      }

      .nav-divider {
        display: none;
      }

      nav {
        flex: 1;
        min-height: 0;
        container-type: inline-size;
      }

      nav ul {
        flex-direction: row;
        height: 100%;
        justify-content: space-evenly;
        align-items: center;
        padding: 0 4px;
      }

      nav ul li {
        flex: 1;
        justify-content: center;
      }

      nav ul li a {
        font-size: clamp(12px, 2.5cqi, 18px);
        font-weight: bold;
        padding: 3px 4px;
        white-space: nowrap;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="nav-wrap">
    <h1>にこにんの2次元アーカイブス</h1>
    <nav>
      <ul>
        <li><a href="okk.html" target="_top">続刊</a></li>
        <li><a href="rdata.html" target="_top">ロリ</a></li>
        <li><a href="oshi.html" target="_top">推し</a></li>
        <li><a href="index.html" target="_top">TOP</a></li>
        <li><a href="kami.html" target="_top">神</a></li>
        <li><a href="hmt.html" target="_top">ハマった</a></li>
        <li><a href="x.html" target="_top">コラム</a></li>
      </ul>
    </nav>
  </div>
</body>

</html>
