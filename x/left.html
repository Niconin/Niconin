<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>左</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #d4edda;
    }

    .nav-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding: 6px 4px;
      gap: 4px;
      border-right: 2px solid #7bbf8e;
    }

    h1 {
      font-size: 12px;
      margin: 0;
      text-align: center;
      overflow-wrap: break-word;
      word-break: break-all;
      line-height: 1.3;
    }

    nav {
      width: 100%;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 2px;
    }

    nav ul li a {
      display: block;
      font-size: 12px;
      padding: 3px 4px;
      text-align: center;
      white-space: nowrap;
      text-decoration: none;
    }

    nav ul li a:hover {
      background: #b3d9be;
    }

    /* Top-bar mode: iframe is wider than tall (landscape orientation) */
    @media (orientation: landscape) {
      .nav-wrap {
        flex-direction: row;
        justify-content: center;
        align-items: center;
        padding: 0 12px;
        gap: 16px;
        border-right: none;
        border-bottom: 2px solid #7bbf8e;
      }

      h1 {
        white-space: nowrap;
        flex-shrink: 0;
        font-size: 14px;
        overflow-wrap: normal;
        word-break: normal;
      }

      nav {
        width: auto;
      }

      nav ul {
        flex-direction: row;
        align-items: center;
        gap: 4px;
        flex-wrap: nowrap;
      }

      nav ul li a {
        padding: 4px 10px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="nav-wrap">
    <h1>にこにんの2次元アーカイブス</h1>
    <nav>
      <ul>
        <li><a href="okk.html" target="_top">続刊</a></li>
        <li><a href="rdata.html" target="_top">ロリ</a></li>
        <li><a href="oshi.html" target="_top">推し</a></li>
        <li><a href="index.html" target="_top">TOP</a></li>
        <li><a href="kami.html" target="_top">神</a></li>
        <li><a href="hmt.html" target="_top">ハマった</a></li>
        <li><a href="x.html" target="_top">コラム</a></li>
      </ul>
    </nav>
  </div>
</body>

</html>
