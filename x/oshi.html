<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推しキャラデータベース</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    .frame-wrap { display: flex; flex-direction: column; height: 100vh; }
    .frame-nav { width: 100%; height: 80px; border: none; flex-shrink: 0; }
    .frame-main { flex: 1; border: none; min-height: 0; }
    @media (min-width: 600px) {
      .frame-wrap { flex-direction: row; }
      .frame-nav { width: 14.7%; height: 100%; }
    }
  </style>
</head>

<body>
  <div class="frame-wrap">
    <iframe src="left.html" class="frame-nav" title="ナビゲーション"></iframe>
    <iframe src="oshir.html" class="frame-main" title="コンテンツ"></iframe>
  </div>
</body>

</html>
