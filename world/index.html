<html lang="ja">

<head>
  <meta charset="UTF-8">

  <link rel="icon" href="favicon.png">
  <style>
    body {
      margin: 0;
      padding: 0 8px;
      overflow-x: hidden;
    }
    img { max-width: 100%; height: auto; }
    .site-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin: 12px auto;
      max-width: 600px;
    }
    .site-grid a {
      display: block;
      text-align: center;
    }
    .site-grid img {
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <div style="text-align: center">
    <img src="Nicoworld.png" alt="Nicoworld">
    <hr>
    <span style="color: #008000">
      <b>Nicoworld公式サイトへようこそ!
    </span>
    <br>
    <span style="color: #008000">ここは
      <span style="font-size: 1.2em">Niconin</span>が作成したサイトのポータルサイトです。
    </span>
    <br>
    <span style="color: #008000">決してすべての人が満足できるというわけではありません。
      </b>
    </span>
    <br>
    <hr>
    <span style="color: #008000">今までに作ったサイトたち</span>
    <br>
    <div class="site-grid">
      <a href="https://www.2co.jp/world/ch/">
        <img src="動画見てねー.png" alt="2coninのゆっくり実況所公式ホームページ">
      </a>
      <a href="https://www.2co.jp/world/net/">
        <img src="net教会.png" alt="net教会公式ホームページ">
      </a>
      <a href="https://www.mcdonald.jp/">
        <img src="バナー.jpg" alt="ドナルド教非公式ホームページ">
      </a>
      <a href="https://www.server.2co.jp/">
        <img src="nishinserver.png" alt="ニシンサーバー公式ホームページ">
      </a>
    </div>
    <hr>
    <span style="color: #008000">公式アプリをダウンロード</span>
    <br>
    <a
      href='https://play.google.com/store/apps/details?id=www.nicoworld.net&pcampaignid=pcampaignidMKT-Other-global-all-co-prtnr-py-PartBadge-Mar2515-1'>
      <img alt='Google Play で手に入れよう' src='google-play-badge.png' style="max-width: 200px;" />
    </a>
    <hr>
    <span style="color: #008000">現在の時間
      <br>
      <span id="viewTime"></span>
    </span>
    <script type="text/javascript">
      timer = setInterval('clock()', 1000); //時刻の更新

      function clock() {
        document.getElementById("viewTime").innerHTML = getNow();
      }

      function getNow() {
        var now = new Date();
        var year = now.getFullYear();
        var mon = now.getMonth() + 1; //１を足すこと
        var day = now.getDate();
        var hour = now.getHours();
        var min = now.getMinutes();
        var sec = now.getSeconds();
        var you = now.getDay(); //曜日

        //曜日の配列（日～土）
        var youbi = new Array("日", "月", "火", "水", "木", "金", "土");
        //出力用
        var s = year + "年" + mon + "月" + day + "日(" + youbi[you] + ")" + hour + "時" + min + "分" + sec + "秒";
        return s;
      }
    </script>
    <br>
    <br>
    <span style="color: #808080">Nicoworld Project</span>
  </div>
</body>

</html>
