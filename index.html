<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="広く浅く色んなモノが好きな底辺うp主にこにんのホームページです。">
  <title>にこにんのホームページ☆</title>
  <link rel="icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300" rel="stylesheet">
  <style>
    a:link, a:visited {
      color: #008000;
      text-decoration: none;
    }

    a:hover {
      color: #008000;
      text-decoration: underline;
    }

    body {
      font-family: 'Kiwi Maru', serif;
      margin: 0;
    }

    #main-container {
      container-type: inline-size;
      width: min(500px, 100%);
      aspect-ratio: 1;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      margin: 2em auto;
      padding-inline: 8px;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #main-container::before {
      content: '';
      flex: 0 0 19.2cqw; /* top spacer: 19.2% of container width ≈ 96px at 500px */
    }

    #main-container::after {
      content: '';
      flex: 0 0 1.5em;   /* bottom spacer: exactly 1 line of text height */
    }

    #link-list {
      list-style: none;
      margin: 0;
      padding: 1.5em 0 0;  /* extra top line of whitespace above the links */
    }

    #link-list li {
      padding: 2px 0;
    }

    #counter {
      text-align: center;
      margin-top: auto;
      padding-top: 3em;  /* 2 blank lines above the counter */
    }
  </style>
</head>

<body>
  <div id="main-container">
    <ul id="link-list">
      <li><a href="https://www.youtube.com/2conin">2coninのゆっくり実況所</a></li>
      <li><a href="https://www.nicovideo.jp/user/126890555">公式ニコ動</a></li>
      <li><a href="https://x.com/2conin_">公式X</a></li>
      <li><a href="https://misskey.io/@niconin">公式Misskey</a></li>
      <li><a href="https://www.blog.2co.jp">公式ブログ</a></li>
      <li><a><s>公式アプリ</s></a></li>
      <li><a href="world/">Nicoworld公式HP</a></li>
      <li><a href="https://www.server.2co.jp">ニシンサーバー公式HP</a></li>
      <li><a><s>ドナルド教非公式HP</s></a></li>
      <li><a href="x/index.html">２次元データベース</a></li>
    </ul>
    <div id="counter">
      <!-- FC2カウンター ここから -->
      <script type="text/javascript" src="https://counter1.fc2.com/counter.php?id=89505005"></script>
      <noscript>
        <img src="https://counter1.fc2.com/counter_img.php?id=89505005" alt="">
      </noscript>
      <!-- FC2カウンター ここまで -->
    </div>
  </div>
  <script>
    (function () {
      var imgs = ['01.png','02.png','03.png','04.png','05.png','06.png','07.png'];
      var i = Math.floor(Math.random() * imgs.length);
      document.getElementById('main-container').style.backgroundImage = "url('" + imgs[i] + "')";
    })();
  </script>
</body>

</html>
